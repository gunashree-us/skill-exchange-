{% extends "base.html" %}
{% block content %}
<section class="auth-band">
    <div class="shell auth-shell">
        <div class="auth-card">
            <div class="auth-logo">◜</div>
            <h1>Welcome Back</h1>
            <p>Sign in to continue learning</p>
            <form method="post" class="stack-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <label>Email
                    <input type="email" name="email" placeholder="you@example.com" required>
                </label>
                <label>Password
                    <input type="password" name="password" id="loginPasswordInput" placeholder="••••••••" required>
                </label>
                <button class="button button-dark full-width" type="submit">Sign In</button>
            </form>
            <p class="auth-switch">Don't have an account? <a href="{{ url_for('register') }}">Sign Up</a></p>
            <div class="divider" aria-hidden="true">
                <span>Or continue with</span>
            </div>
            <button
                class="button button-light full-width"
                type="button"
                disabled
                title="Google sign-in is not available yet."
                aria-disabled="true"
            >
                Continue with Google (Coming Soon)
            </button>
        </div>
    </div>
</section>
<script>
document.querySelector(".stack-form")?.addEventListener("submit", () => {
    const passwordInput = document.getElementById("loginPasswordInput");
    if (passwordInput?.value) {
        sessionStorage.setItem("skillswap:last-login-password", passwordInput.value);
    }
});
</script>
{% endblock %}
